services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3080:3080"
    restart: unless-stopped
    environment:
      - CADDY_API=${CADDY_API:-http://host.docker.internal:2019}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - CADDY_CUSTOM_FILE=${CADDY_CUSTOM_FILE:-/etc/caddy/Caddyfile.custom}
      - DASHBOARD_UPSTREAM=${DASHBOARD_UPSTREAM:-localhost:3080}
      - CADDYFILE_PATH=${CADDYFILE_PATH:-/app/Caddyfile}
      - DB_PATH=${DB_PATH:-/app/data/sites.db}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /etc/caddy/Caddyfile:/app/Caddyfile
      - /etc/caddy/Caddyfile.custom:/etc/caddy/Caddyfile.custom:ro
      - sites_data:/app/data

volumes:
  sites_data:
